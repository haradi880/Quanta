[tool.pytest.ini_options]
markers = [
  "integration: requires native binaries, model artifacts, or external services",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.coverage.run]
branch = true
omit = [
  "tests/*",
  ".venv/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80
