name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --select E9,F63,F7,F82

  import-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: pytest tests/test_import_isolation.py -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-notebook.txt pip-audit bandit
      - run: pip-audit -r requirements-notebook.txt
      - run: pip-audit -r requirements-cluster.txt
      - run: bandit -r core cli cluster engines notebooks telemetry ui -x tests -ll
      - run: python scripts/check_tracked_secrets.py

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r requirements-notebook.txt pytest pytest-cov psycopg2-binary PyYAML
      - run: pytest tests/ -m "not integration" --cov=core --cov-branch --cov-report=term-missing --cov-fail-under=80

  packaging-contract:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: pytest tests/test_packaging.py -q
      - id: empty-vendor-gate
        continue-on-error: true
        shell: pwsh
        run: .\build\build_windows.ps1 -Python python
      - if: steps.empty-vendor-gate.outcome != 'failure'
        shell: pwsh
        run: throw "Expected the unpopulated release vendor gate to fail."

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: false
          tags: haradibots:ci
